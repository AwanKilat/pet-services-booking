name: pet_care_booking
description: Pet Care Booking Flutter Application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

  # Firebase 
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.0

  # File upload (receipt)
  file_picker: ^8.0.0

  # Charts
  fl_chart: ^0.66.2

  # PDF print
  pdf: ^3.10.8
  printing: ^5.12.0

  url_launcher: ^6.2.5 

  flutter_pdfview: ^1.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets: 
    - assets/images/

